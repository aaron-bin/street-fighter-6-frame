<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>街霸6 帧数速查网</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部栏 -->
    <div class="header">
        <h1 id="headerTitle">🎮 街霸6 帧数速查网</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索角色名称...（上下箭头选择，回车确认）" autocomplete="off">
        </div>
        <button id="langToggle" class="lang-toggle-btn" title="Switch to English">EN</button>
        <div id="escHint" style="color: #666; font-size: 12px;">按 ESC 清除搜索</div>
    </div>

    <!-- 主体 -->
    <div class="main">
        <!-- 左侧角色列表 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title">选择角色</div>
        </div>

        <!-- 右侧内容 -->
        <div class="content" id="content">
            <div id="roster-banner" class="roster-banner"></div>
            <div class="empty-state">
                <div class="icon">👊</div>
                <p id="emptyText">请从左侧选择一个角色查看帧数数据</p>
                <p id="emptyHint" style="font-size: 14px; color: #555; margin-top: 8px;">支持键盘导航：↑↓ 选择角色，Enter 确认</p>
            </div>
        </div>
    </div>

    <script src="characters.js"></script>
    <script src="move_names_cn.js"></script>
    <script src="char_avatars.js"></script>
    <script src="i18n.js"></script>
    <script src="app.js"></script>
</body>
</html>
